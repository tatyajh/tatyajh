<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TATIANA.OS System Online Cyberpunk HUD Banner</title>
  <desc id="desc">Animated futuristic operating system banner for GitHub profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse"><stop stop-color="#05070B"/><stop offset="0.45" stop-color="#111827"/><stop offset="1" stop-color="#05070B"/></linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#C2185B"><animate attributeName="stop-color" values="#C2185B;#FF4D9A;#7C3AED;#C2185B" dur="7s" repeatCount="indefinite"/></stop><stop offset="0.5" stop-color="#FF4D9A"><animate attributeName="stop-color" values="#FF4D9A;#7C3AED;#C2185B;#FF4D9A" dur="7s" repeatCount="indefinite"/></stop><stop offset="1" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#C2185B;#FF4D9A;#7C3AED" dur="7s" repeatCount="indefinite"/></stop></linearGradient>
    <linearGradient id="sweep" x1="-240" y1="0" x2="80" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#FF4D9A" stop-opacity="0"/><stop offset="0.5" stop-color="#FF4D9A" stop-opacity="0.55"/><stop offset="1" stop-color="#FF4D9A" stop-opacity="0"/><animateTransform attributeName="gradientTransform" type="translate" from="-300 0" to="1450 0" dur="5.5s" repeatCount="indefinite"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" stroke="#E5E7EB" stroke-opacity="0.055" stroke-width="1"/></pattern>
    <pattern id="scan" width="1200" height="12" patternUnits="userSpaceOnUse"><rect width="1200" height="1.5" fill="#E5E7EB" opacity="0.07"/></pattern>
    <clipPath id="panelClip"><path d="M42 42H1158V338L1082 378H42V42Z"/></clipPath>
    <style>.mono{font-family:&quot;SFMono-Regular&quot;,&quot;Cascadia Code&quot;,&quot;Consolas&quot;,monospace}.label{fill:#E5E7EB;font-size:19px;letter-spacing:2px}.small{fill:#E5E7EB;font-size:14px;letter-spacing:2px;opacity:.82}</style>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/><rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <g opacity="0.22"><circle cx="1002" cy="94" r="170" stroke="#7C3AED"/><circle cx="1002" cy="94" r="112" stroke="#FF4D9A"/><path d="M832 94H1172M1002 -76V264" stroke="#E5E7EB" stroke-opacity=".22"/></g>
  <g clip-path="url(#panelClip)"><rect x="42" y="42" width="1116" height="336" fill="#111827" opacity=".54"/><rect width="1200" height="420" fill="url(#scan)"><animateTransform attributeName="transform" type="translate" values="0 -24;0 24" dur="1.8s" repeatCount="indefinite"/></rect><rect x="-120" y="42" width="180" height="336" fill="url(#sweep)" opacity=".45"/></g>
  <path d="M42 42H1158V338L1082 378H42V42Z" stroke="url(#neon)" stroke-width="2.2" filter="url(#glow)"/>
  <path d="M70 72H210M990 72H1130M70 350H300M888 350H1060L1128 314" stroke="#FF4D9A" stroke-width="1.5" stroke-linecap="round" opacity=".78"/><path d="M82 94H126V138H82V94ZM1074 236H1118V280H1074V236Z" stroke="#7C3AED" stroke-width="1.5" opacity=".9"/>
  <text x="86" y="132" class="mono small">CORE PROFILE</text><text x="86" y="178" class="mono" fill="#E5E7EB" font-size="76" font-weight="800" letter-spacing="4">TATIANA.OS</text><text x="91" y="218" class="mono" fill="#FF4D9A" font-size="22" font-weight="700" letter-spacing="5" filter="url(#glow)">SYSTEM ONLINE</text>
  <g transform="translate(86 255)"><rect width="610" height="54" rx="12" fill="#05070B" opacity=".72" stroke="#C2185B" stroke-opacity=".7"/><text x="24" y="35" class="mono label"><tspan fill="#7C3AED">&gt;</tspan><tspan> Frontend Developer</tspan><tspan fill="#FF4D9A"> / </tspan><tspan>Unity Developer</tspan><animate attributeName="opacity" values="1;.72;1" dur="2.2s" repeatCount="indefinite"/></text><rect x="506" y="18" width="11" height="23" fill="#FF4D9A"><animate attributeName="opacity" values="0;1;1;0" dur="1s" repeatCount="indefinite"/></rect></g>
  <g transform="translate(742 142)"><text class="mono small" x="0" y="0">ENABLED DISCIPLINES</text><g class="mono" font-size="18" fill="#E5E7EB"><text x="0" y="48">Cybersecurity</text><text x="0" y="88">Fashion Designer</text><text x="0" y="128">Systems Engineer</text></g><g stroke="#FF4D9A" stroke-width="2" opacity=".9"><path d="M250 33H338"/><path d="M250 73H310"/><path d="M250 113H358"/></g></g>
  <g opacity=".9"><path d="M972 190l35 20v40l-35 20-35-20v-40l35-20Z" stroke="#7C3AED" stroke-width="2" filter="url(#glow)"><animateTransform attributeName="transform" type="rotate" from="0 972 230" to="360 972 230" dur="14s" repeatCount="indefinite"/></path><path d="M972 206l21 12v24l-21 12-21-12v-24l21-12Z" stroke="#FF4D9A" stroke-width="2"/></g>
  <rect x="42" y="42" width="1116" height="336" fill="none" stroke="#E5E7EB" stroke-opacity=".12"/>
</svg>
